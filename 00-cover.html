<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>《AI工作场景落地实战》——封面</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  font-family: -apple-system,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
}
body {
  background: #060d1f;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ── 背景光晕 ── */
.bg-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
}
.glow-1 {
  position: absolute;
  top: -10%; left: 20%;
  width: 60vw; height: 60vw;
  background: radial-gradient(circle, rgba(99,102,241,.22) 0%, transparent 60%);
}
.glow-2 {
  position: absolute;
  bottom: -10%; right: 5%;
  width: 50vw; height: 50vw;
  background: radial-gradient(circle, rgba(6,182,212,.12) 0%, transparent 60%);
}
.glow-3 {
  position: absolute;
  top: 40%; left: -10%;
  width: 40vw; height: 40vw;
  background: radial-gradient(circle, rgba(139,92,246,.1) 0%, transparent 60%);
}

/* ── 网格背景 ── */
.grid-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
  background-size: 48px 48px;
}

/* ── 封面主体 ── */
.cover {
  position: relative;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px 48px;
  max-width: 680px;
  width: 90%;
}

/* 顶部标签 */
.cover-eyebrow {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 44px;
}
.eyebrow-line {
  width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(165,180,252,.5));
}
.eyebrow-line.right {
  background: linear-gradient(90deg, rgba(165,180,252,.5), transparent);
}
.eyebrow-text {
  font-size: 10.5px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(165,180,252,.6);
  white-space: nowrap;
}

/* 书名 */
.cover-title {
  font-size: 52px;
  font-weight: 900;
  line-height: 1.12;
  color: #fff;
  margin-bottom: 10px;
  letter-spacing: -1px;
}
.cover-title .highlight {
  background: linear-gradient(135deg, #a5b4fc 0%, #67e8f9 50%, #6ee7b7 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 副标题 */
.cover-subtitle {
  font-size: 16px;
  color: rgba(255,255,255,.45);
  line-height: 1.7;
  margin-bottom: 48px;
  max-width: 400px;
}

/* 四层递进标签 */
.layers-strip {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 52px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px;
  overflow: hidden;
  padding: 2px;
}
.layer-item {
  flex: 1;
  padding: 10px 4px;
  text-align: center;
  border-radius: 9px;
  font-size: 12px;
  font-weight: 700;
  color: rgba(255,255,255,.35);
  transition: all .2s;
  position: relative;
}
.layer-item.active {
  color: #fff;
}
.layer-item.l1.active { background: rgba(59,130,246,.25); }
.layer-item.l2.active { background: rgba(124,58,237,.25); }
.layer-item.l3.active { background: rgba(16,185,129,.25); }
.layer-item.l4.active { background: rgba(249,115,22,.25); }
.layer-arrow {
  font-size: 10px;
  color: rgba(255,255,255,.2);
  padding: 0 2px;
  flex-shrink: 0;
}
.layer-sub {
  font-size: 9.5px;
  font-weight: 500;
  opacity: .7;
  display: block;
  margin-top: 2px;
}

/* 分隔线 */
.cover-divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
  margin-bottom: 32px;
}

/* 底部信息 */
.cover-meta {
  display: flex;
  align-items: center;
  gap: 24px;
}
.meta-item {
  text-align: center;
}
.meta-num {
  font-size: 22px;
  font-weight: 900;
  color: rgba(255,255,255,.8);
  line-height: 1;
  margin-bottom: 4px;
}
.meta-label {
  font-size: 10px;
  letter-spacing: 1px;
  color: rgba(255,255,255,.3);
  text-transform: uppercase;
}
.meta-divider {
  width: 1px;
  height: 32px;
  background: rgba(255,255,255,.1);
}

/* 年份+作者徽标 */
.cover-badge {
  margin-top: 40px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 24px;
  padding: 8px 20px;
}
.badge-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: linear-gradient(135deg, #a5b4fc, #6ee7b7);
}
.badge-text {
  font-size: 11px;
  color: rgba(255,255,255,.4);
  letter-spacing: 1px;
}

/* 底部翻页导航 */
.cover-nav {
  position: fixed;
  bottom: 32px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 20;
}
.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 24px;
  padding: 10px 20px;
  font-size: 12px;
  color: rgba(255,255,255,.5);
  text-decoration: none;
  transition: all .2s;
}
.nav-btn:hover {
  background: rgba(255,255,255,.1);
  color: rgba(255,255,255,.8);
  transform: translateY(-1px);
}
</style>
</head>
<body>

<!-- 背景 -->
<div class="bg-glow">
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="glow-3"></div>
</div>
<div class="grid-bg"></div>

<!-- 封面主体 -->
<div class="cover">

  <div class="cover-eyebrow">
    <div class="eyebrow-line"></div>
    <span class="eyebrow-text">AI 白领工作手册</span>
    <div class="eyebrow-line right"></div>
  </div>

  <h1 class="cover-title">
    AI工作场景<br><span class="highlight">落地实战</span>
  </h1>

  <p class="cover-subtitle">
    从第一个 Prompt 到搭建自己的 AI 系统<br>
    写给白领的 AI 能力建设方法论
  </p>

  <!-- 四层递进 -->
  <div class="layers-strip">
    <div class="layer-item l1 active">
      Prompt
      <span class="layer-sub">一次对话</span>
    </div>
    <div class="layer-arrow">›</div>
    <div class="layer-item l2 active">
      Skill
      <span class="layer-sub">可复用模块</span>
    </div>
    <div class="layer-arrow">›</div>
    <div class="layer-item l3 active">
      Workflow
      <span class="layer-sub">自动化流程</span>
    </div>
    <div class="layer-arrow">›</div>
    <div class="layer-item l4 active">
      Agent
      <span class="layer-sub">自主决策</span>
    </div>
  </div>

  <div class="cover-divider"></div>

  <div class="cover-meta">
    <div class="meta-item">
      <div class="meta-num">16</div>
      <div class="meta-label">章节</div>
    </div>
    <div class="meta-divider"></div>
    <div class="meta-item">
      <div class="meta-num">3</div>
      <div class="meta-label">部分</div>
    </div>
    <div class="meta-divider"></div>
    <div class="meta-item">
      <div class="meta-num">3</div>
      <div class="meta-label">附录</div>
    </div>
    <div class="meta-divider"></div>
    <div class="meta-item">
      <div class="meta-num">2026</div>
      <div class="meta-label">版本</div>
    </div>
  </div>

  <div class="cover-badge">
    <div class="badge-dot"></div>
    <span class="badge-text">AI 执行判断 · 人定义标准</span>
    <div class="badge-dot"></div>
  </div>

</div>

<!-- 底部导航 -->
<div class="cover-nav">
  <a class="nav-btn" href="index.html">查看完整目录 →</a>
</div>

</body>
</html>
